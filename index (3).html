<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食事ノート — 栄養 & 食費トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --paper: #F3EDE3;
    --bark: #C9A97A;
    --bark-deep: #A07840;
    --moss: #5A7A5A;
    --moss-light: #EEF4EE;
    --tomato: #C85A3A;
    --tomato-light: #FAF0ED;
    --sky: #4A7A9B;
    --sky-light: #EEF4F8;
    --ink: #2A2320;
    --ink-mid: #5A504A;
    --ink-soft: #9A908A;
    --ink-faint: #E8E0D5;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(42,35,32,0.08);
    --shadow-lg: 0 8px 32px rgba(42,35,32,0.12);
    --r: 12px;
    --r-lg: 20px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--ink-faint);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
  }

  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--bark); border-radius: 50%; }

  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  .nav-tab {
    background: none;
    border: none;
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
  }
  .nav-tab:hover { background: var(--paper); color: var(--ink); }
  .nav-tab.active { background: var(--ink); color: var(--white); }

  .api-btn {
    background: none;
    border: 1px solid var(--ink-faint);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .api-btn:hover { border-color: var(--bark); color: var(--bark-deep); }
  .api-btn.set { border-color: var(--moss); color: var(--moss); }

  /* MAIN */
  main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* UPLOAD AREA */
  .upload-section { margin-bottom: 1.5rem; }

  .drop-zone {
    border: 2px dashed var(--ink-faint);
    border-radius: var(--r-lg);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }
  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(201,169,122,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .drop-zone:hover, .drop-zone.drag {
    border-color: var(--bark);
    background: #FFFDF9;
  }
  .drop-zone input { display: none; }

  .drop-icon {
    width: 64px;
    height: 64px;
    background: var(--paper);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 28px;
    transition: transform 0.2s;
  }
  .drop-zone:hover .drop-icon { transform: scale(1.05); }
  .drop-title { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--ink-soft); }

  /* PREVIEW */
  .preview-wrap {
    display: none;
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    position: relative;
    background: var(--ink);
    margin-bottom: 1rem;
  }
  .preview-wrap.show { display: block; }
  .preview-img {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    display: block;
    opacity: 0.95;
  }
  .preview-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(42,35,32,0.5) 0%, transparent 50%);
    pointer-events: none;
  }
  .preview-change {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.2s;
  }
  .preview-change:hover { background: var(--white); }

  /* ANALYZE BUTTON */
  .btn-analyze {
    width: 100%;
    padding: 15px;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: var(--r);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-analyze:hover:not(:disabled) { background: #3A3330; transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-analyze:active:not(:disabled) { transform: translateY(0); }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-analyze .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .btn-analyze.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULT CARDS */
  .result-section { margin-top: 1.5rem; }

  .result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  .result-meal-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
  }
  .health-score-badge {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    padding: 10px 16px;
    min-width: 72px;
  }
  .score-num { font-size: 28px; font-weight: 300; font-family: 'DM Sans', sans-serif; }
  .score-label { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.05em; text-transform: uppercase; }
  .score-green { color: var(--moss); }
  .score-amber { color: var(--bark-deep); }
  .score-red { color: var(--tomato); }

  /* CARD BASE */
  .card {
    background: var(--white);
    border-radius: var(--r-lg);
    border: 1px solid var(--ink-faint);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 1rem;
  }

  /* NUTRITION GRID */
  .nutrition-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .nut-cell {
    background: var(--paper);
    border-radius: var(--r);
    padding: 12px 8px;
    text-align: center;
  }
  .nut-val { font-size: 19px; font-weight: 500; color: var(--ink); }
  .nut-unit { font-size: 10px; color: var(--ink-soft); }
  .nut-name { font-size: 11px; color: var(--ink-mid); margin-top: 3px; }

  /* PFC BARS */
  .pfc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .pfc-row:last-child { margin-bottom: 0; }
  .pfc-label { font-size: 12px; color: var(--ink-mid); width: 58px; text-align: right; flex-shrink: 0; }
  .pfc-bar-bg { flex: 1; height: 6px; background: var(--paper); border-radius: 3px; overflow: hidden; }
  .pfc-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); width: 0; }
  .pfc-pct { font-size: 12px; color: var(--ink-soft); width: 38px; text-align: right; }
  .fill-protein { background: var(--moss); }
  .fill-fat { background: var(--tomato); }
  .fill-carbs { background: var(--sky); }

  .extra-row {
    display: flex;
    gap: 1rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--ink-faint);
    font-size: 13px;
    color: var(--ink-mid);
  }
  .extra-item { display: flex; gap: 5px; align-items: center; }
  .extra-dot { width: 6px; height: 6px; background: var(--bark); border-radius: 50%; }

  /* FOODS TABLE */
  .food-list { display: flex; flex-direction: column; gap: 0; }
  .food-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--ink-faint);
    gap: 8px;
  }
  .food-item:last-child { border-bottom: none; }
  .food-info { flex: 1; }
  .food-name { font-size: 14px; color: var(--ink); }
  .food-amount { font-size: 12px; color: var(--ink-soft); }
  .food-right { text-align: right; flex-shrink: 0; }
  .food-cal { font-size: 13px; color: var(--ink-mid); }
  .food-price { font-size: 14px; font-weight: 500; color: var(--ink); }

  .price-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0 0;
    margin-top: 4px;
    border-top: 2px solid var(--ink);
  }
  .price-total-lbl { font-size: 14px; font-weight: 500; color: var(--ink-mid); }
  .price-total-val { font-size: 20px; font-weight: 500; color: var(--ink); }
  .price-note { font-size: 11px; color: var(--ink-soft); margin-top: 4px; text-align: right; }

  /* FEEDBACK */
  .feedback-list { display: flex; flex-direction: column; gap: 10px; }
  .feedback-item {
    display: flex;
    gap: 12px;
    padding: 12px;
    border-radius: var(--r);
    font-size: 14px;
    line-height: 1.5;
    align-items: flex-start;
  }
  .feedback-item.good { background: var(--moss-light); }
  .feedback-item.warn { background: #FEF9F0; }
  .feedback-item.tip { background: var(--sky-light); }
  .feedback-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .icon-good { background: var(--moss); color: white; }
  .icon-warn { background: var(--bark-deep); color: white; }
  .icon-tip { background: var(--sky); color: white; }
  .feedback-text { color: var(--ink); }

  /* HISTORY */
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-card {
    background: var(--white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r-lg);
    display: flex;
    overflow: hidden;
    transition: box-shadow 0.2s;
    cursor: pointer;
  }
  .history-card:hover { box-shadow: var(--shadow); }
  .history-thumb {
    width: 90px;
    min-height: 90px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .history-body { padding: 14px 16px; flex: 1; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .history-name { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .history-meta { font-size: 12px; color: var(--ink-soft); }
  .history-right { text-align: right; flex-shrink: 0; }
  .history-cal { font-size: 16px; font-weight: 500; color: var(--ink); }
  .history-price { font-size: 12px; color: var(--ink-mid); }
  .history-score { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-top: 4px; }
  .score-tag-good { background: var(--moss-light); color: var(--moss); }
  .score-tag-mid { background: #FEF9F0; color: var(--bark-deep); }
  .score-tag-low { background: var(--tomato-light); color: var(--tomato); }

  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--ink-soft);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.5; }
  .empty-state p { font-size: 14px; }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .summary-metric {
    background: var(--white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r-lg);
    padding: 1.25rem;
  }
  .summary-metric-val { font-size: 28px; font-weight: 300; color: var(--ink); margin-bottom: 2px; }
  .summary-metric-lbl { font-size: 12px; color: var(--ink-soft); }

  /* API MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,35,32,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--white);
    border-radius: var(--r-lg);
    padding: 2rem;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .modal-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .modal-sub { font-size: 13px; color: var(--ink-mid); margin-bottom: 1.5rem; line-height: 1.6; }
  .modal input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--bark); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.5rem; }
  .btn-cancel {
    padding: 9px 18px;
    background: none;
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--ink-mid);
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--ink-mid); }
  .btn-save {
    padding: 9px 18px;
    background: var(--ink);
    border: none;
    border-radius: var(--r);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--white);
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-save:hover { background: #3A3330; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    z-index: 2000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ERROR */
  .error-box {
    background: var(--tomato-light);
    border: 1px solid #F0C4BC;
    border-radius: var(--r);
    padding: 1rem 1.25rem;
    font-size: 14px;
    color: var(--tomato);
    margin-top: 1rem;
    line-height: 1.5;
  }

  /* CLIENT SELECTOR */
  .client-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 1rem;
  }
  .client-select {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background: var(--white);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .client-select:focus { border-color: var(--bark); }
  .btn-add-client {
    padding: 10px 14px;
    background: none;
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--ink-mid);
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-add-client:hover { border-color: var(--bark); color: var(--bark-deep); }

  /* FB EDIT */
  .fb-edit-area {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
    background: var(--white);
  }
  .fb-edit-area:focus { border-color: var(--bark); }
  .fb-edit-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    display: block;
  }
  /* MEAL TITLE EDIT */
  .meal-title-input {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    border: none;
    border-bottom: 1.5px dashed var(--ink-faint);
    background: transparent;
    outline: none;
    width: 100%;
    padding: 2px 0;
    transition: border-color 0.2s;
    line-height: 1.3;
  }
  .meal-title-input:focus { border-color: var(--bark); }

  /* MEAL TIME SELECTOR */
  .meal-time-row {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .meal-time-btn {
    padding: 6px 14px;
    border: 1px solid var(--ink-faint);
    border-radius: 99px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: none;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }
  .meal-time-btn:hover { border-color: var(--bark); color: var(--bark-deep); }
  .meal-time-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

  .btn-slide {
    width: 100%;
    padding: 13px;
    background: var(--white);
    color: var(--ink);
    border: 1.5px solid var(--bark);
    border-radius: var(--r);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-slide:hover { background: var(--paper); transform: translateY(-1px); }

  /* SLIDE MODAL */
  .slide-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,16,14,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .slide-overlay.show { display: flex; }

  .slide-modal {
    background: var(--white);
    border-radius: var(--r-lg);
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
  }

  .slide-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--ink-faint);
    flex-shrink: 0;
  }
  .slide-toolbar-title { font-size: 14px; font-weight: 500; color: var(--ink); }
  .slide-toolbar-btns { display: flex; gap: 8px; }

  .btn-print {
    padding: 7px 16px;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: var(--r);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-print:hover { opacity: 0.8; }

  .btn-close-slide {
    padding: 7px 14px;
    background: none;
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--ink-mid);
  }

  .slide-body {
    overflow-y: auto;
    flex: 1;
    padding: 2rem;
    background: #E8E0D5;
  }

  /* THE SLIDE ITSELF */
  .slide {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(42,35,32,0.15);
    aspect-ratio: 16/9;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    font-family: 'DM Sans', sans-serif;
  }

  .slide-left {
    position: relative;
    overflow: hidden;
  }
  .slide-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .slide-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(255,255,255,0.15));
  }
  .slide-date-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(42,35,32,0.65);
    color: white;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;

  .slide-right {
    padding: 28px 28px 20px;

  .slide-score-row {

    gap: 8px;
    margin-bottom: 14px;

    height: 36px;

    display: flex;
    align-items: center;

    font-weight: 500;
    flex-shrink: 0;

  .slide-divider { height: 1px; background: var(--ink-faint); margin-bottom: 14px; }

  .slide-nut-row {
    display: grid;

    gap: 6px;
    margin-bottom: 14px;
  }
  .slide-nut-cell {
    background: var(--paper);

    padding: 8px 4px;

  .slide-nut-val { font-size: clamp(12px, 1.5vw, 16px); font-weight: 500; color: var(--ink); }
  .slide-nut-lbl { font-size: 9px; color: var(--ink-soft); margin-top: 2px; }

  .slide-pfc-section { margin-bottom: 14px; }
  .slide-pfc-label { font-size: 10px; color: var(--ink-soft); margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .slide-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .slide-bar-name { font-size: 10px; color: var(--ink-mid); width: 44px; text-align: right; flex-shrink: 0; }
  .slide-bar-bg { flex: 1; height: 5px; background: var(--paper); border-radius: 3px; overflow: hidden; }
  .slide-bar-fill { height: 100%; border-radius: 3px; }
  .slide-bar-pct { font-size: 10px; color: var(--ink-soft); width: 26px; text-align: right; }

  .slide-fb-section { flex: 1; }
  .slide-fb-label { font-size: 10px; color: var(--ink-soft); margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .slide-fb-item {
    display: flex;
    gap: 6px;
    align-items: flex-start;
    margin-bottom: 5px;
    font-size: 10px;
    line-height: 1.4;
    color: var(--ink);
  }
  .slide-fb-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .slide-footer {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--ink-faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .slide-footer-logo { font-family: 'Noto Serif JP', serif; font-size: 10px; color: var(--ink-soft); }
  .slide-footer-cal { font-size: 11px; color: var(--ink-mid); }

  @media print {
    body > *:not(.slide-overlay) { display: none !important; }
    .slide-overlay { display: flex !important; position: static !important; background: none !important; padding: 0 !important; }
    .slide-modal { max-height: none; box-shadow: none; }
    .slide-toolbar { display: none !important; }
    .slide-body { padding: 0; background: none; overflow: visible; }
    .slide { box-shadow: none; width: 100%; }
  }

  @media (max-width: 560px) {
    header { padding: 0 1rem; }
    main { padding: 1.25rem 1rem 3rem; }
    .nav-tab { padding: 6px 10px; font-size: 12px; }
    .nutrition-grid { grid-template-columns: repeat(2, 1fr); }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .api-btn { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    食事ノート
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('scan')">解析</button>
    <button class="nav-tab" onclick="showPage('history')">履歴</button>
    <button class="nav-tab" onclick="showPage('summary')">サマリー</button>
  </nav>
  <button class="api-btn" id="apiBtn" onclick="openApiModal()">APIキー設定</button>
</header>

<main>
  <!-- SCAN PAGE -->
  <div class="page active" id="page-scan">
    <div class="client-row">
      <select class="client-select" id="clientSelect">
        <option value="">— お客様を選択 —</option>
      </select>
      <button class="btn-add-client" onclick="addClient()">＋ 追加</button>
    </div>
    <div class="meal-time-row">
      <button class="meal-time-btn active" onclick="setMealTime('朝食', this)">朝食</button>
      <button class="meal-time-btn" onclick="setMealTime('昼食', this)">昼食</button>
      <button class="meal-time-btn" onclick="setMealTime('夕食', this)">夕食</button>
      <button class="meal-time-btn" onclick="setMealTime('間食', this)">間食</button>
    </div>
    <div class="upload-section">
      <div class="preview-wrap" id="previewWrap">
        <img class="preview-img" id="previewImg" alt="食事写真">
        <div class="preview-overlay"></div>
        <button class="preview-change" onclick="resetUpload()">写真を変更</button>
      </div>
      <div class="drop-zone" id="dropZone"
        onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
        <div class="drop-icon">🍱</div>
        <div class="drop-title">食事の写真をアップロード</div>
        <div class="drop-sub">クリックまたはドラッグ＆ドロップ</div>
      </div>
    </div>

    <button class="btn-analyze" id="analyzeBtn" disabled onclick="analyzeImage()">
      <div class="spinner"></div>
      <span id="analyzeBtnText">AIで栄養 &amp; 食費を解析する</span>
    </button>

    <div id="errorBox"></div>
    <div id="resultSection" class="result-section"></div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div class="client-row" style="margin-bottom:1rem;">
      <select class="client-select" id="historyFilter" onchange="renderHistory()">
        <option value="">全員</option>
      </select>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">
        <div class="empty-icon">📒</div>
        <p>まだ食事の記録がありません<br>写真を解析すると履歴に追加されます</p>
      </div>
    </div>
  </div>

  <!-- SUMMARY PAGE -->
  <div class="page" id="page-summary">
    <div id="summaryContent">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <p>食事を記録するとサマリーが表示されます</p>
      </div>
    </div>
  </div>
</main>

<!-- SLIDE MODAL -->
<div class="slide-overlay" id="slideOverlay">
  <div class="slide-modal">
    <div class="slide-toolbar">
      <span class="slide-toolbar-title">フィードバックスライド</span>
      <div class="slide-toolbar-btns">
        <button class="btn-print" onclick="window.print()">PDFで保存</button>
        <button class="btn-close-slide" onclick="closeSlide()">閉じる</button>
      </div>
    </div>
    <div class="slide-body">
      <div class="slide" id="slideContent"></div>
    </div>
  </div>
</div>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <div class="modal-title">Anthropic APIキー</div>
    <div class="modal-sub">
      食事写真の解析にはAnthropicのAPIキーが必要です。キーはブラウザのローカルストレージにのみ保存され、外部に送信されません。<br><br>
      <a href="https://console.anthropic.com/" target="_blank" style="color: var(--bark-deep);">console.anthropic.com</a> で取得できます。
    </div>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeApiModal()">キャンセル</button>
      <button class="btn-save" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let apiKey = localStorage.getItem('anthropic_api_key') || '';
let currentBase64 = null;
let currentMimeType = 'image/jpeg';
let mealHistory = JSON.parse(localStorage.getItem('meal_history') || '[]');

// Init
if (apiKey) {
  document.getElementById('apiBtn').classList.add('set');
  document.getElementById('apiBtn').textContent = 'APIキー変更';
} else {
  setTimeout(() => openApiModal(), 500);
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'summary') renderSummary();
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
}

function handleFile(file) {
  if (!file) return;
  currentMimeType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    currentBase64 = dataUrl.split(',')[1];
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewWrap').classList.add('show');
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('resultSection').innerHTML = '';
    document.getElementById('errorBox').innerHTML = '';
  };
  reader.readAsDataURL(file);
}

function resetUpload() {
  currentBase64 = null;
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('dropZone').style.display = '';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('fileInput').value = '';
  document.getElementById('resultSection').innerHTML = '';
  document.getElementById('errorBox').innerHTML = '';
}

async function analyzeImage() {
  if (!currentBase64) return;
  if (!apiKey) { openApiModal(); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('analyzeBtnText').textContent = '解析中...';
  document.getElementById('errorBox').innerHTML = '';

  const prompt = `あなたは日本人の食生活に詳しい栄養士です。この食事の写真を詳しく分析してください。

以下のJSON形式のみで返答してください。他のテキストは一切不要です：

{
  "meal_name": "料理名（日本語）",
  "foods": [
    {"name": "食材または料理名", "amount": "量（g/個など）", "calories": カロリー数値(kcal), "price": 価格推定(円)}
  ],
  "nutrition": {
    "total_calories": 合計カロリー(kcal),
    "protein": タンパク質(g),
    "fat": 脂質(g),
    "carbs": 炭水化物(g),
    "fiber": 食物繊維(g),
    "salt": 食塩相当量(g)
  },
  "total_price_min": 最低価格推定(円),
  "total_price_max": 最高価格推定(円),
  "price_note": "価格の根拠（日本のスーパー相場基準）",
  "health_score": 以下の採点基準に基づく10点満点の整数スコア,
  "score_breakdown": {
    "pfc": "PFCバランス評価（P:15-20%/F:20-30%/C:50-65%が理想）+0〜3点",
    "vegetables": "野菜・食物繊維の充実度 +0〜2点",
    "salt": "塩分・加工食品の少なさ +0〜2点",
    "variety": "食材の多様性・彩り +0〜2点",
    "negative": "揚げ物多め・加工食品過多・欠食等 -0〜3点",
    "total_reason": "総合コメント（1文）"
  },
  "feedback": [
    {"type": "good", "text": "ポジティブで明るいトーンで良い点を伝える（例：「野菜たっぷりで食物繊維バッチリ！」のように親しみやすく）"},
    {"type": "warn", "text": "やさしく前向きなトーンで改善点を伝える（例：「塩分がちょっと多めかも。お味噌汁を薄めにするといいかも！」のように）"},
    {"type": "tip", "text": "明日すぐ実践できる具体的なアドバイス（例：「明日の朝食にバナナ1本追加するだけでカリウムUP！」のように）"}
  ],
  "pfc_balance": {"protein_pct": タンパク質エネルギー比%, "fat_pct": 脂質エネルギー比%, "carbs_pct": 炭水化物エネルギー比%}
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentMimeType, data: currentBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('レスポンスの解析に失敗しました');
    const parsed = JSON.parse(jsonMatch[0]);
    renderResult(parsed);
    saveMeal(parsed, document.getElementById('previewImg').src);
    showToast('解析完了！');
  } catch(err) {
    document.getElementById('errorBox').innerHTML =
      `<div class="error-box">エラーが発生しました：${err.message}<br><small>APIキーを確認するか、もう一度お試しください。</small></div>`;
  }

  btn.disabled = false;
  btn.classList.remove('loading');
  document.getElementById('analyzeBtnText').textContent = 'もう一度解析する';
}

function renderResult(d) {
  const n = d.nutrition;
  const pfc = d.pfc_balance;
  const score = d.health_score;
  const scoreClass = score >= 8 ? 'score-green' : score >= 6 ? 'score-amber' : 'score-red';
  const clientName = document.getElementById('clientSelect').value || '';

  const foodRows = (d.foods || []).map(f => `
    <div class="food-item">
      <div class="food-info">
        <div class="food-name">${f.name}</div>
        <div class="food-amount">${f.amount}</div>
      </div>
      <div class="food-right">
        <div class="food-cal">${Math.round(f.calories)} kcal</div>
        <div class="food-price">¥${f.price.toLocaleString()}</div>
      </div>
    </div>`).join('');

  const feedItems = (d.feedback || []).map(f => {
    const cls = f.type === 'good' ? 'good' : f.type === 'warn' ? 'warn' : 'tip';
    const iconCls = f.type === 'good' ? 'icon-good' : f.type === 'warn' ? 'icon-warn' : 'icon-tip';
    const iconTxt = f.type === 'good' ? '✓' : f.type === 'warn' ? '!' : '→';
    return `<div class="feedback-item ${cls}">
      <div class="feedback-icon ${iconCls}">${iconTxt}</div>
      <div class="feedback-text">${f.text}</div>
    </div>`;
  }).join('');

  const mealTime = document.querySelector('.meal-time-btn.active')?.textContent || '食事';
  const defaultTitle = clientName ? `${clientName}様_${mealTime}` : d.meal_name;

  document.getElementById('resultSection').innerHTML = `
    <div id="captureArea" style="background:var(--cream);padding:1rem;border-radius:var(--r-lg);">
      <div class="result-header">
        <div style="flex:1;">
          ${clientName ? `<div style="font-size:11px;color:var(--bark-deep);font-weight:500;margin-bottom:6px;letter-spacing:0.04em;">👤 ${clientName} さん · ${mealTime}</div>` : ''}
          <input class="meal-title-input" id="mealTitleInput" value="${defaultTitle}" oninput="window._lastResult.meal_name=this.value">
          <div style="font-size:11px;color:var(--ink-soft);margin-top:4px;">${d.meal_name}</div>
        </div>
        <div class="health-score-badge" style="cursor:pointer;" onclick="toggleScoreInfo()">
          <div class="score-num ${scoreClass}">${score}</div>
          <div class="score-label">健康スコア <span style="font-size:10px;opacity:0.6;">?</span></div>
        </div>
      </div>

      <div id="scoreInfoBox" style="display:none;background:var(--white);border:1px solid var(--ink-faint);border-radius:var(--r);padding:1rem;margin-bottom:1rem;font-size:12px;line-height:1.8;color:var(--ink-mid);">
        <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:8px;">採点基準（10点満点）</div>
        <div>🥦 PFCバランス（理想：P15-20% / F20-30% / C50-65%）… +0〜3点</div>
        <div>🥗 野菜・食物繊維の充実度 … +0〜2点</div>
        <div>🧂 塩分・加工食品の少なさ … +0〜2点</div>
        <div>🌈 食材の多様性・彩り … +0〜2点</div>
        <div>⚠️ 揚げ物多め・加工食品過多・極端な少食 … -0〜3点</div>
        ${d.score_breakdown ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--ink-faint);color:var(--ink);">今回：${d.score_breakdown.total_reason}</div>` : ''}
      </div>

      <div class="card">
        <div class="card-title">栄養素</div>
        <div class="nutrition-grid">
          <div class="nut-cell">
            <div class="nut-val">${Math.round(n.total_calories)}</div>
            <div class="nut-unit">kcal</div>
            <div class="nut-name">カロリー</div>
          </div>
          <div class="nut-cell">
            <div class="nut-val">${Math.round(n.protein)}<span style="font-size:13px;">g</span></div>
            <div class="nut-name">タンパク質</div>
          </div>
          <div class="nut-cell">
            <div class="nut-val">${Math.round(n.fat)}<span style="font-size:13px;">g</span></div>
            <div class="nut-name">脂質</div>
          </div>
          <div class="nut-cell">
            <div class="nut-val">${Math.round(n.carbs)}<span style="font-size:13px;">g</span></div>
            <div class="nut-name">炭水化物</div>
          </div>
        </div>
        <div class="pfc-row">
          <span class="pfc-label">タンパク質</span>
          <div class="pfc-bar-bg"><div class="pfc-bar-fill fill-protein" data-pct="${pfc.protein_pct}"></div></div>
          <span class="pfc-pct">${Math.round(pfc.protein_pct)}%</span>
        </div>
        <div class="pfc-row">
          <span class="pfc-label">脂質</span>
          <div class="pfc-bar-bg"><div class="pfc-bar-fill fill-fat" data-pct="${pfc.fat_pct}"></div></div>
          <span class="pfc-pct">${Math.round(pfc.fat_pct)}%</span>
        </div>
        <div class="pfc-row">
          <span class="pfc-label">炭水化物</span>
          <div class="pfc-bar-bg"><div class="pfc-bar-fill fill-carbs" data-pct="${pfc.carbs_pct}"></div></div>
          <span class="pfc-pct">${Math.round(pfc.carbs_pct)}%</span>
        </div>
        <div class="extra-row">
          <div class="extra-item"><div class="extra-dot"></div> 食物繊維 ${n.fiber}g</div>
          <div class="extra-item"><div class="extra-dot"></div> 食塩相当量 ${n.salt}g</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">食材 &amp; 食費内訳</div>
        <div class="food-list">${foodRows}</div>
        <div class="price-total-row">
          <span class="price-total-lbl">推定合計</span>
          <div>
            <div class="price-total-val">¥${d.total_price_min.toLocaleString()} 〜 ¥${d.total_price_max.toLocaleString()}</div>
            <div class="price-note">${d.price_note}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">フィードバック <span style="font-size:10px;color:var(--ink-soft);font-weight:400;">（編集できます）</span></div>
        <div class="feedback-list" id="fbEditList">
          ${(d.feedback || []).map((f, i) => {
            const cls = f.type === 'good' ? 'good' : f.type === 'warn' ? 'warn' : 'tip';
            const iconCls = f.type === 'good' ? 'icon-good' : f.type === 'warn' ? 'icon-warn' : 'icon-tip';
            const iconTxt = f.type === 'good' ? '🌟' : f.type === 'warn' ? '💡' : '🎯';
            const lbl = f.type === 'good' ? '今日のGood' : f.type === 'warn' ? 'もっと良くなるかも' : '明日やってみて';
            return `<div class="feedback-item ${cls}" style="flex-direction:column;gap:6px;">
              <div style="display:flex;gap:8px;align-items:center;">
                <span style="font-size:16px;">${iconTxt}</span>
                <span class="fb-edit-label" style="margin:0;font-weight:500;color:var(--ink);">${lbl}</span>
              </div>
              <textarea class="fb-edit-area" id="fb_${i}" oninput="syncFb(${i}, this.value)">${f.text}</textarea>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div style="text-align:right;padding:8px 0 0;font-size:11px;color:var(--ink-soft);">● 食事ノート</div>
    </div>

    <button class="btn-analyze" id="captureBtn" onclick="captureImage()" style="margin-top:0.75rem;background:var(--moss);">
      <div class="spinner" id="captureSpinner"></div>
      <span id="captureBtnText">📷 画像として保存する</span>
    </button>
  `;

  window._lastResult = d;
  window._lastThumb = document.getElementById('previewImg').src;

  // Animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.pfc-bar-fill').forEach(el => {
      el.style.width = Math.min(parseFloat(el.dataset.pct), 100) + '%';
    });
  });

  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function saveMeal(d, thumb) {
  const client = document.getElementById('clientSelect').value || '';
  const mealTime = document.querySelector('.meal-time-btn.active')?.textContent || '食事';
  const entry = {
    id: Date.now(),
    name: d.meal_name,
    displayName: client ? `${client}様_${mealTime}` : d.meal_name,
    client: client,
    mealTime: mealTime,
    calories: d.nutrition.total_calories,
    priceMin: d.total_price_min,
    priceMax: d.total_price_max,
    score: d.health_score,
    protein: d.nutrition.protein,
    fat: d.nutrition.fat,
    carbs: d.nutrition.carbs,
    thumb: thumb,
    date: new Date().toISOString()
  };
  mealHistory.unshift(entry);
  if (mealHistory.length > 50) mealHistory.pop();
  localStorage.setItem('meal_history', JSON.stringify(mealHistory));
}

function renderHistory() {
  const filter = document.getElementById('historyFilter')?.value || '';
  const filtered = filter ? mealHistory.filter(m => m.client === filter) : mealHistory;

  if (!filtered.length) {
    document.getElementById('historyList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📒</div>
        <p>${filter ? filter + ' さんの' : ''}記録がありません</p>
      </div>`;
    return;
  }
  document.getElementById('historyList').innerHTML = filtered.map(m => {
    const d = new Date(m.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const tagCls = m.score >= 8 ? 'score-tag-good' : m.score >= 6 ? 'score-tag-mid' : 'score-tag-low';
    const label = m.displayName || m.name;
    return `<div class="history-card">
      <img class="history-thumb" src="${m.thumb}" alt="${label}">
      <div class="history-body">
        <div>
          <div class="history-name">${label}</div>
          <div class="history-meta">${m.client ? `👤 ${m.client} · ` : ''}${dateStr}</div>
          <span class="history-score ${tagCls}">${m.score}/10</span>
        </div>
        <div class="history-right">
          <div class="history-cal">${Math.round(m.calories)} kcal</div>
          <div class="history-price">¥${m.priceMin.toLocaleString()}〜</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSummary() {
  if (!mealHistory.length) {
    document.getElementById('summaryContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <p>食事を記録するとサマリーが表示されます</p>
      </div>`;
    return;
  }

  const count = mealHistory.length;
  const totalCal = mealHistory.reduce((s, m) => s + m.calories, 0);
  const totalCost = mealHistory.reduce((s, m) => s + m.priceMin, 0);
  const avgScore = mealHistory.reduce((s, m) => s + m.score, 0) / count;
  const avgCal = totalCal / count;

  document.getElementById('summaryContent').innerHTML = `
    <div class="summary-grid">
      <div class="summary-metric">
        <div class="summary-metric-val">${Math.round(totalCal).toLocaleString()}</div>
        <div class="summary-metric-lbl">合計カロリー (kcal)</div>
      </div>
      <div class="summary-metric">
        <div class="summary-metric-val">¥${Math.round(totalCost).toLocaleString()}</div>
        <div class="summary-metric-lbl">合計食費 (推定)</div>
      </div>
      <div class="summary-metric">
        <div class="summary-metric-val">${count}</div>
        <div class="summary-metric-lbl">記録した食事回数</div>
      </div>
      <div class="summary-metric">
        <div class="summary-metric-val">${avgScore.toFixed(1)}</div>
        <div class="summary-metric-lbl">平均健康スコア</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">1食あたりの平均</div>
      <div class="nutrition-grid">
        <div class="nut-cell">
          <div class="nut-val">${Math.round(avgCal)}</div>
          <div class="nut-unit">kcal</div>
          <div class="nut-name">カロリー</div>
        </div>
        <div class="nut-cell">
          <div class="nut-val">${(mealHistory.reduce((s,m)=>s+m.protein,0)/count).toFixed(1)}<span style="font-size:12px;">g</span></div>
          <div class="nut-name">タンパク質</div>
        </div>
        <div class="nut-cell">
          <div class="nut-val">${(mealHistory.reduce((s,m)=>s+m.fat,0)/count).toFixed(1)}<span style="font-size:12px;">g</span></div>
          <div class="nut-name">脂質</div>
        </div>
        <div class="nut-cell">
          <div class="nut-val">${(mealHistory.reduce((s,m)=>s+m.carbs,0)/count).toFixed(1)}<span style="font-size:12px;">g</span></div>
          <div class="nut-name">炭水化物</div>
        </div>
      </div>
    </div>
  `;
}

// API MODAL
function openApiModal() {
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('apiModal').classList.add('show');
  setTimeout(() => document.getElementById('apiKeyInput').focus(), 100);
}
function closeApiModal() {
  document.getElementById('apiModal').classList.remove('show');
}
function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('anthropic_api_key', apiKey);
  document.getElementById('apiBtn').classList.add('set');
  document.getElementById('apiBtn').textContent = 'APIキー変更';
  closeApiModal();
  showToast('APIキーを保存しました');
}
document.getElementById('apiModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('apiModal')) closeApiModal();
});

let currentMealTime = '朝食';

function setMealTime(time, btn) {
  currentMealTime = time;
  document.querySelectorAll('.meal-time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// CLIENT MANAGEMENT
let clients = JSON.parse(localStorage.getItem('clients') || '[]');

function renderClientSelect() {
  const sel = document.getElementById('clientSelect');
  const cur = sel ? sel.value : '';
  const opts = '<option value="">— お客様を選択 —</option>' +
    clients.map(c => `<option value="${c}">${c}</option>`).join('');
  if (sel) sel.innerHTML = opts;
  if (sel && cur) sel.value = cur;

  const hf = document.getElementById('historyFilter');
  if (hf) {
    const hcur = hf.value;
    hf.innerHTML = '<option value="">全員</option>' +
      clients.map(c => `<option value="${c}">${c}</option>`).join('');
    if (hcur) hf.value = hcur;
  }
}

function addClient() {
  const name = prompt('お客様の名前を入力してください：');
  if (!name || !name.trim()) return;
  const n = name.trim();
  if (!clients.includes(n)) {
    clients.push(n);
    localStorage.setItem('clients', JSON.stringify(clients));
    renderClientSelect();
  }
  document.getElementById('clientSelect').value = n;
}

renderClientSelect();

function syncFb(i, val) {
  if (window._lastResult && window._lastResult.feedback[i]) {
    window._lastResult.feedback[i].text = val;
  }
}

          <div class="slide-nut-lbl">kcal</div>
        </div>

        </div>
        <div class="slide-nut-cell">
          <div class="slide-nut-val">${Math.round(n.fat)}g</div>
          <div class="slide-nut-lbl">脂質</div>
        </div>
        <div class="slide-nut-cell">
          <div class="slide-nut-val">${Math.round(n.carbs)}g</div>
          <div class="slide-nut-lbl">炭水化物</div>
        </div>
      </div>
      <div class="slide-pfc-section">
        <div class="slide-pfc-label">PFCバランス</div>
        <div class="slide-bar-row">
          <span class="slide-bar-name">タンパク質</span>
          <div class="slide-bar-bg"><div class="slide-bar-fill" style="width:${Math.min(pfc.protein_pct,100)}%;background:#5A7A5A;"></div></div>

function closeSlide() {

document.getElementById('slideOverlay').addEventListener('click', (e) => {

// CAPTURE IMAGE
async function captureImage() {
  const btn = document.getElementById('captureBtn');
  const spinner = document.getElementById('captureSpinner');
  const btnText = document.getElementById('captureBtnText');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = '画像を生成中...';

  // テキストエリアの内容を表示用テキストに一時的に置換
  const textareas = document.querySelectorAll('#captureArea textarea');
  const originals = [];
  textareas.forEach(ta => {
    originals.push({ el: ta, val: ta.value, parent: ta.parentNode });
    const p = document.createElement('p');
    p.style.cssText = ta.style.cssText;
    p.style.fontSize = '13px';
    p.style.lineHeight = '1.5';
    p.style.color = 'var(--ink)';
    p.style.margin = '0';
    p.textContent = ta.value;
    ta.parentNode.replaceChild(p, ta);
  });

  try {
    const el = document.getElementById('captureArea');
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#FAF7F2',
      logging: false
    });

    // 元に戻す
    originals.forEach(o => {
      const cur = o.parent.querySelector('p');
      if (cur) o.parent.replaceChild(o.el, cur);
    });

    // ダウンロード
    const link = document.createElement('a');
    const name = window._lastResult?.meal_name || 'meal';
    const client = document.getElementById('clientSelect').value;
    link.download = `${client ? client + '_' : ''}${name}_feedback.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('画像を保存しました！');
  } catch(err) {
    // 元に戻す
    originals.forEach(o => {
      const cur = o.parent.querySelector('p');
      if (cur) o.parent.replaceChild(o.el, cur);
    });
    showToast('保存に失敗しました');
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  btnText.textContent = '📷 画像として保存する';
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
